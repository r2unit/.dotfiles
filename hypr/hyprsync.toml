# HyprSync Configuration
# Generated by: hyprsync init

[general]
hostname = "alderaan"
mode = "push"
conflict_strategy = "newest_wins"
poll_interval = 0
dry_run = false
log_level = "info"

[git]
repo = "/home/r2unit/.local/share/hyprsync/repo"
auto_commit = true
commit_template = "hyprsync: update from $hostname"

[ssh]
key = "/home/r2unit/.ssh/id_ed25519"
port = 22
timeout = 10

[[device]]
name = "alderaan"
host = "alderaan.nerdpitch"
user = "root"
port = 22

[[sync]]
name = "config"
paths = [
    "/home/r2unit/.config/nvim",
]
exclude = [
    "*.log",
    "*.bak",
    "__pycache__/",
]

[[sync]]
name = "dotfiles"
paths = [
    "/home/r2unit/.zshrc",
    "/home/r2unit/.zshenv",
    "/home/r2unit/.bashrc",
    "/home/r2unit/.bash_profile",
    "/home/r2unit/.gitconfig",
]

[[sync]]
name = "local"
paths = [
    "/home/r2unit/.local/bin",
]
exclude = [
    "__pycache__/",
    "*.pyc",
]

[hooks]
pre_sync = ""
post_sync = ""

