# VPN Client Configuration
# This file configures the IKEv1/IKEv2 VPN client

# Gateway settings
gateway=91.208.87.10
port=500

# Identity and authentication
local_id=QDIPS
psk=QoaqoxeTPxMk

# Protocol version (1 for IKEv1, 2 for IKEv2)
ike_version=1

# IKEv1 specific settings
aggressive_mode=true
xauth=true

# Crypto settings for IKEv1 (matching FortiGate)
# encr_alg: 7=AES-128-CBC, 12=AES-256-CBC
# integ_alg: 2=SHA1, 12=SHA256
# dh_group: 2=MODP1024, 14=MODP2048, 20=ECP384
encr_alg=7
encr_key_len=128
integ_alg=2
dh_group=2

# Lifetimes (seconds)
ike_lifetime=28800
child_lifetime=3600

# Advanced options
use_nat_t=true
dpd_delay=30
debug=false
